services:
  garoon-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: garoon-icloud-sync:local
    working_dir: /app
    environment:
      TZ: Asia/Tokyo
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${SYNC_ENV_FILE:-./.env}:/app/.env:ro
      - ./data:/app/data
      - ./runtime:/app/runtime
      - ./logs:/app/logs
    command: ["python", "-m", "src.main"]
    init: true
